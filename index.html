<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Quieres ser mi dama de honor?</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #fdf5f3;
            /* Patrón de puntos sutil para el fondo en tono terracota */
            background-image: radial-gradient(#f4cdbd 1px, transparent 1px);
            background-size: 20px 20px;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
        }

        /* Transición suave para cuando el botón se mueva */
        #btn-no {
            transition: all 0.3s ease-in-out;
            z-index: 50;
        }
    </style>
</head>

<body class="relative min-h-screen flex items-center justify-center overflow-hidden">

    <div
        class="bg-white/90 backdrop-blur-sm p-10 rounded-3xl shadow-xl border border-[#f4cdbd] text-center max-w-lg w-11/12 z-10">

        <h1 class="text-5xl md:text-6xl text-[#ce7f75] mb-3 drop-shadow-sm">¿Quieres ser nuestra dama de honor?</h1>
        <p class="text-xl md:text-2xl text-[#b8685e] mb-8 font-medium">
            Jordan y Hanashi<br>
            <span class="text-lg md:text-xl font-normal">21/06/2026</span>
        </p>

        <div class="flex flex-col sm:flex-row justify-center items-center gap-6 mt-8 relative min-h-[50px]">
            <button id="btn-yes"
                class="px-8 py-3 bg-[#ce7f75] hover:bg-[#b8685e] text-white font-semibold rounded-full shadow-lg hover:shadow-[#ce7f75]/50 transform hover:scale-105 transition-all w-48 text-lg z-20">
                ¡SÍ, ACEPTO!
            </button>

            <button id="btn-no"
                class="px-8 py-3 bg-gray-200 hover:bg-gray-300 text-[#693125] font-semibold rounded-full shadow-md w-48 text-lg">
                No
            </button>
        </div>

        <div id="success-message"
            class="hidden mt-8 p-5 bg-green-50 border border-green-200 text-green-700 rounded-xl shadow-inner animate-fade-in">
            <p class="font-bold text-xl mb-2">¡Sabía que dirías que sí! 💖</p>
            <p class="text-sm">A continuación se descargará un archivo PDF con todas las instrucciones de vestimenta y
                demás detalles.</p>
            <p class="text-sm mt-2 font-semibold">Por favor, revisa tu carpeta de <span
                    class="underline">Descargas</span>.</p>
        </div>

    </div>

    <script src="script.js"></script>
</body>

</html>
